name: Build kernel ELF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu nasm make

      - name: Build kernel ELF
        run: make all

      - name: Upload kernel ELF
        uses: actions/upload-artifact@v4
        with:
          name: polandos.elf
          path: polandos.elf
